name: PeachTrace CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
    paths:
      - "src/peachfuzz_ai/peachtrace.py"
      - "src/peachfuzz_ai/backends.py"
      - "src/peachfuzz_ai/cli.py"
      - "tests/test_peachtrace.py"
      - "docs/PEACHTRACE.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  peachtrace:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - run: pytest -q tests/test_peachtrace.py tests/test_backends.py
      - run: peachfuzz backends --include-unsafe
      - run: peachfuzz run --target json --backend peachtrace --runs 50 corpus/json_api
      - run: peachfuzz peachtrace --target webhook --runs 50 corpus/webhook
