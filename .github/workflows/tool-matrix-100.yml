name: 100 Tool Matrix CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
    paths:
      - "tests/test_tool_matrix_100.py"
      - "docs/TEST_MATRIX_100.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tool-matrix-100:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - run: pytest -q tests/test_tool_matrix_100.py
      - run: pytest -q
